<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>White or Red Wine? – Free Online Wine Tasting Quiz</title>
    <meta name="description" content="Gewürztraminer. Primitivo. Viognier. Can you tell which grape makes white wine and which makes red? Play the free wine tasting quiz — no sign-up needed.">
    <link rel="canonical" href="https://whiteorredwine.com/" />
    <meta property="og:title" content="White or Red Wine? – Free Wine Tasting Quiz">
    <meta property="og:description" content="Gewürztraminer. Primitivo. Viognier. Tannat. Some are white wines. Some are red. Can you tell them apart? Play free, no sign-up.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://whiteorredwine.com/">
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" href="fonts/Inter-Latin.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="container">
            <div>
                <p class="site-title" id="site-title"></p>
                <p class="header-tagline" id="header-tagline"></p>
            </div>
            <div class="header-right">
                <div class="lang-switcher">
                    <button class="lang-btn" data-lang="en">EN</button>
                    <button class="lang-btn" data-lang="de">DE</button>
                    <button class="lang-btn" data-lang="fr">FR</button>
                </div>
                <a id="more-quizzes-link" href="https://octoquizpus.com" target="_blank" rel="noopener noreferrer" style="font-size:0.82rem;color:var(--gray-text);"></a>
            </div>
        </div>
    </header>

    <main>
        <!-- ── Intro ───────────────────────────────────────────── -->
        <section class="intro">
            <div class="container">
                <h1 id="intro-h1"></h1>
                <p id="intro-para"></p>
            </div>
        </section>

        <!-- ── Quiz ────────────────────────────────────────────── -->
        <section class="quiz-section">
            <div class="container">

                <!-- Category selector -->
                <div class="cat-switcher" id="cat-switcher">
                    <button class="cat-btn active" data-cat="classic"     id="cat-btn-classic"></button>
                    <button class="cat-btn"        data-cat="de-approved" id="cat-btn-de-approved"></button>
                    <button class="cat-btn"        data-cat="fr-approved" id="cat-btn-fr-approved"></button>
                    <button class="cat-btn"        data-cat="it-approved" id="cat-btn-it-approved"></button>
                </div>

                <!-- Difficulty selector (hidden for Klassiker) -->
                <div class="diff-switcher" id="diff-switcher" hidden>
                    <button class="diff-btn active" data-diff="normal" id="diff-btn-normal"></button>
                    <button class="diff-btn"        data-diff="hard"   id="diff-btn-hard"></button>
                    <button class="diff-btn"        data-diff="expert" id="diff-btn-expert"></button>
                    <button class="diff-btn"        data-diff="all"    id="diff-btn-all"></button>
                </div>

                <!-- Question screen -->
                <div id="quiz-screen">
                    <p class="quiz-progress-label">
                        <span id="q-label-question">Question</span>&nbsp;<span id="q-current">1</span>&nbsp;<span id="q-label-of">of</span>&nbsp;<span id="q-total">10</span>
                    </p>
                    <div class="quiz-bar-track">
                        <div class="quiz-bar-fill" id="q-bar"></div>
                    </div>
                    <div class="quiz-card">
                        <div class="quiz-name" id="q-name">—</div>
                        <div class="quiz-feedback" id="q-feedback"></div>
                    </div>
                    <div class="quiz-answers">
                        <button class="btn-answer btn-answer--white" id="btn-white"></button>
                        <button class="btn-answer btn-answer--red"   id="btn-red"></button>
                    </div>
                </div>

                <!-- Results screen -->
                <div id="quiz-results" hidden>
                    <div class="result-score" id="res-score"></div>
                    <p class="result-label" id="res-label"></p>
                    <p class="result-verdict" id="res-verdict"></p>
                    <ul class="review-list" id="review-list"></ul>
                    <button class="btn-restart" id="btn-restart"></button>
                </div>

            </div>
        </section>

        <!-- ── About ───────────────────────────────────────────── -->
        <section class="about-section">
            <div class="container">
                <h2 id="about-title"></h2>
                <div id="faq-container"></div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>
                Part of <a href="https://octoquizpus.com" target="_blank" rel="noopener noreferrer">octoquizpus.com</a>
                &nbsp;|&nbsp;
                <a id="imprint-link" href="https://legal.lueders.solutions/en/imprint/" target="_blank" rel="noopener noreferrer"></a>
                &nbsp;|&nbsp;
                <a id="privacy-link" href="https://legal.lueders.solutions/en/privacy/web-whiteorredwine/" target="_blank" rel="noopener noreferrer"></a>
            </p>
            <p style="margin-top:6px;"><span id="made-by"></span> <a href="https://lueders.app" target="_blank" rel="noopener noreferrer">lueders.app</a></p>
        </div>
    </footer>

    <script src="wines_german.js"></script>
    <script src="wines_french.js"></script>
    <script src="wines_italian.js"></script>
    <script src="wines.js"></script>
    <script>

        // ── i18n ──────────────────────────────────────────────────────────────
        let currentLang = 'en';
        let currentCategory = 'classic';
        let currentDifficulty = 'normal'; // 'normal' | 'hard' | 'expert' | 'all'
        const t = () => TRANSLATIONS[currentLang];

        function detectLanguage() {
            const saved = localStorage.getItem('wineQuizLang');
            if (saved && TRANSLATIONS[saved]) return saved;
            const browser = (navigator.language || 'en').slice(0, 2).toLowerCase();
            if (browser === 'de') return 'de';
            if (browser === 'fr') return 'fr';
            return 'en';
        }

        function renderFAQ() {
            document.getElementById('faq-container').innerHTML = t().faq
                .map(item => `
                    <details>
                        <summary>${item.q}</summary>
                        <p class="faq-body">${item.a}</p>
                    </details>`)
                .join('');
        }

        // Switching language always restarts the quiz so wine names and UI match
        function setLanguage(lang) {
            if (!TRANSLATIONS[lang]) return;
            currentLang = lang;
            localStorage.setItem('wineQuizLang', lang);
            document.documentElement.lang = lang;
            document.title = t().pageTitle;

            document.querySelectorAll('.lang-btn').forEach(btn =>
                btn.classList.toggle('active', btn.dataset.lang === lang));

            document.getElementById('site-title').innerHTML          = t().siteTitleHtml;
            document.getElementById('header-tagline').textContent    = t().headerTagline;
            document.getElementById('intro-h1').innerHTML            = t().introH1Html;
            document.getElementById('intro-para').innerHTML          = t().introPara;
            document.getElementById('q-label-question').textContent  = t().questionOf;
            document.getElementById('q-label-of').textContent        = t().questionOfSep;
            document.getElementById('btn-white').innerHTML           = t().btnWhite;
            document.getElementById('btn-red').innerHTML             = t().btnRed;
            document.getElementById('res-label').textContent         = t().outOf10;
            document.getElementById('btn-restart').innerHTML         = t().btnRestart;
            document.getElementById('about-title').textContent       = t().aboutTitle;
            document.getElementById('more-quizzes-link').textContent = t().moreQuizzes;
            document.getElementById('imprint-link').textContent      = t().imprintLink;
            document.getElementById('privacy-link').textContent      = t().privacyLink;
            document.getElementById('made-by').textContent           = t().madeBy;

            document.getElementById('cat-btn-de-approved').textContent = t().catDeApproved;
            document.getElementById('cat-btn-fr-approved').textContent = t().catFrApproved;
            document.getElementById('cat-btn-it-approved').textContent = t().catItApproved;
            document.getElementById('cat-btn-classic').textContent     = t().catClassic;
            document.getElementById('diff-btn-all').textContent    = t().diffAll;
            document.getElementById('diff-btn-normal').textContent = t().diffNormal;
            document.getElementById('diff-btn-hard').textContent   = t().diffHard;
            document.getElementById('diff-btn-expert').textContent = t().diffExpert;
            renderFAQ();
            startQuiz();
        }

        function setCategory(cat) {
            currentCategory = cat;
            document.querySelectorAll('.cat-btn').forEach(btn =>
                btn.classList.toggle('active', btn.dataset.cat === cat));
            document.getElementById('diff-switcher').hidden = (cat === 'classic');
            startQuiz();
        }

        // ── Helpers ───────────────────────────────────────────────────────────
        function shuffle(arr) {
            const a = [...arr];
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

        function buildClassicPool() {
            const TOP = 10;
            const topN = arr => [...arr]
                .filter(v => v.ha > 0)
                .sort((a, b) => b.ha - a.ha)
                .slice(0, TOP);
            const merge = arrays => {
                const seen = new Set(), out = [];
                for (const v of arrays.flat())
                    if (!seen.has(v.name)) { seen.add(v.name); out.push(v); }
                return out;
            };
            return {
                white: merge([topN(DE_APPROVED.white), topN(FR_APPROVED.white), topN(IT_APPROVED.white)]),
                red:   merge([topN(DE_APPROVED.red),   topN(FR_APPROVED.red),   topN(IT_APPROVED.red)]),
            };
        }

        function getPool() {
            if (currentCategory === 'de-approved') return DE_APPROVED;
            if (currentCategory === 'fr-approved') return FR_APPROVED;
            if (currentCategory === 'it-approved') return IT_APPROVED;
            return buildClassicPool();
        }

        function calcMedianHa(pool) {
            const vals = [...pool.white, ...pool.red]
                .filter(v => typeof v === 'object')
                .map(v => v.ha)
                .filter(ha => ha > 0)
                .sort((a, b) => a - b);
            if (!vals.length) return 0;
            const mid = Math.floor(vals.length / 2);
            return vals.length % 2 === 0 ? (vals[mid - 1] + vals[mid]) / 2 : vals[mid];
        }

        function generateQuiz(count) {
            const half = count / 2;
            const pool = getPool();
            const isHaPool = pool.white.length > 0 && typeof pool.white[0] === 'object';

            let fw = pool.white;
            let fr = pool.red;

            if (isHaPool && currentDifficulty !== 'all') {
                const median = calcMedianHa(pool);
                const f = (arr) => {
                    let result;
                    if (currentDifficulty === 'normal')      result = arr.filter(v => v.ha >= median);
                    else if (currentDifficulty === 'hard')   result = arr.filter(v => v.ha > 0 && v.ha < median);
                    else                                     result = arr.filter(v => v.ha === 0);
                    return result.length >= half ? result : arr; // fallback if pool too small
                };
                fw = f(pool.white);
                fr = f(pool.red);
            }

            const toName = v => typeof v === 'object' ? v.name : v;
            const whites = shuffle(fw).slice(0, half).map(v => ({ name: toName(v), type: 'white' }));
            const reds   = shuffle(fr).slice(0, half).map(v => ({ name: toName(v), type: 'red'   }));
            return shuffle([...whites, ...reds]);
        }

        // ── DOM refs ──────────────────────────────────────────────────────────
        const screenEl     = document.getElementById('quiz-screen');
        const resultsEl    = document.getElementById('quiz-results');
        const qNameEl      = document.getElementById('q-name');
        const qCurrentEl   = document.getElementById('q-current');
        const qTotalEl     = document.getElementById('q-total');
        const qBarEl       = document.getElementById('q-bar');
        const feedbackEl   = document.getElementById('q-feedback');
        const btnWhite     = document.getElementById('btn-white');
        const btnRed       = document.getElementById('btn-red');
        const btnRestart   = document.getElementById('btn-restart');
        const resScoreEl   = document.getElementById('res-score');
        const resVerdictEl = document.getElementById('res-verdict');
        const reviewListEl = document.getElementById('review-list');

        const TOTAL = 10;
        let questions = [], current = 0, score = 0, answers = [];

        const verdict = s => t().verdicts.find(([min]) => s >= min)[1];

        // ── Quiz Logic ────────────────────────────────────────────────────────
        function startQuiz() {
            document.getElementById('diff-switcher').hidden = (currentCategory === 'classic');
            questions = generateQuiz(TOTAL);
            current = score = 0;
            answers = [];
            qTotalEl.textContent = questions.length;
            resultsEl.hidden = true;
            screenEl.hidden  = false;
            showQuestion();
        }

        function showQuestion() {
            const q = questions[current];
            qNameEl.textContent    = q.name;
            qCurrentEl.textContent = current + 1;
            qBarEl.style.width     = `${(current / TOTAL) * 100}%`;
            feedbackEl.textContent = '';
            feedbackEl.className   = 'quiz-feedback';
            btnWhite.disabled      = false;
            btnRed.disabled        = false;
        }

        function handleAnswer(guess) {
            btnWhite.disabled = btnRed.disabled = true;
            const q  = questions[current];
            const ok = guess === q.type;
            if (ok) score++;
            answers.push({ name: q.name, type: q.type, guess, correct: ok });
            const typeLabel = q.type === 'white' ? t().typeWhite : t().typeRed;
            feedbackEl.textContent = ok
                ? t().correctFeedback(q.name, typeLabel)
                : t().wrongFeedback(q.name, typeLabel);
            feedbackEl.className = 'quiz-feedback ' + (ok ? 'quiz-feedback--correct' : 'quiz-feedback--wrong');
            current++;
            if (current < questions.length) setTimeout(showQuestion, 900);
            else setTimeout(showResults, 1000);
        }

        function renderReviewList() {
            reviewListEl.innerHTML = '';
            answers.forEach(a => {
                const li = document.createElement('li');
                li.className = a.correct ? 'r-correct' : 'r-wrong';
                const badgeLabel = a.type === 'white' ? t().typeWhite : t().typeRed;
                li.innerHTML = `
                    <span class="review-name">${a.name}</span>
                    <span class="review-badge review-badge--${a.type}">${badgeLabel}</span>
                    <span class="review-icon ${a.correct ? 'review-icon--correct' : 'review-icon--wrong'}">${a.correct ? '✓' : '✗'}</span>
                `;
                reviewListEl.appendChild(li);
            });
        }

        function showResults() {
            qBarEl.style.width       = '100%';
            resScoreEl.textContent   = score;
            resVerdictEl.textContent = verdict(score);
            renderReviewList();
            screenEl.hidden  = true;
            resultsEl.hidden = false;
        }

        // ── Event Listeners ───────────────────────────────────────────────────
        btnWhite.addEventListener('click',   () => handleAnswer('white'));
        btnRed.addEventListener('click',     () => handleAnswer('red'));
        btnRestart.addEventListener('click', startQuiz);

        document.querySelectorAll('.lang-btn').forEach(btn =>
            btn.addEventListener('click', () => setLanguage(btn.dataset.lang)));

        document.querySelectorAll('.cat-btn').forEach(btn =>
            btn.addEventListener('click', () => setCategory(btn.dataset.cat)));

        document.querySelectorAll('.diff-btn').forEach(btn =>
            btn.addEventListener('click', () => {
                currentDifficulty = btn.dataset.diff;
                document.querySelectorAll('.diff-btn').forEach(b =>
                    b.classList.toggle('active', b.dataset.diff === btn.dataset.diff));
                startQuiz();
            }));

        // ── Init ──────────────────────────────────────────────────────────────
        setLanguage(detectLanguage());

    </script>
</body>
</html>
